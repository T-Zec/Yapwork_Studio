name: Yapwork CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:

  backend:
    name: Backend Check (Django)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    env:
      SECRET_KEY: test_secret_key_for_ci_purposes
      DEBUG: False
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
        
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint Backend with Flake8
        run: flake8 . || true

      - name: Django System Check
        run: |
          python manage.py check
      
      - name: Check Migrations
        run: |
          python manage.py makemigrations --check --dry-run      

      - name: Run Backend Tests
        run: |
          python manage.py test

  frontend:
    name: Frontend Build Check (Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install

      - name: Lint Frontend with ESLint
        run: npm run lint || true

      - name: Build Frontend
        run: |
          npm run build

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Builds
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker Image
        run: |
          docker build -t yapwork-backend ./backend